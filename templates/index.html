<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asked Black</title>
    <style>
        body { background-color: #0f0f12; color: #ffffff; font-family: 'Pretendard', sans-serif; padding: 20px; margin: 0; }
        .container { max-width: 450px; margin: 0 auto; background: #1a1a24; padding: 25px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.5); }
        h1 { font-size: 2rem; color: #adff2f; text-shadow: 0 0 10px rgba(173,255,47,0.3); margin-bottom: 25px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #2e2e3e; border-radius: 30px; background: #252535; color: white; font-size: 1rem; box-sizing: border-box; outline: none; transition: 0.3s; }
        input[type="text"]:focus { border-color: #adff2f; }
        button { background: #adff2f; color: #000; border: none; padding: 12px 25px; font-weight: bold; border-radius: 30px; cursor: pointer; font-size: 1rem; width: 100%; margin-top: 10px; }
        a { color: #8ab4f8; text-decoration: none; font-size: 0.95rem; }
        .btn-link { display: inline-block; background: #252535; color: #fff; padding: 12px; border-radius: 15px; width: 100%; text-align: center; box-sizing: border-box; margin-top: 8px; font-weight: bold; }
        .room-item { background: #252535; padding: 15px; border-radius: 15px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ASKED _ 黑</h1>
        {% if session.get('user') %}
            <p style="color: #bbb;">🔥 <b style="color:#fff;">{{ session['user'] }}</b>님 접속 중</p>
            <a href="/user/{{ session['user'] }}" class="btn-link" style="background:#adff2f; color:#000;">내 프로필 홈</a>
            <a href="/group/create" class="btn-link">➕ 새 단톡방 파기</a>
            
            <h3 style="margin-top:25px; color:#adff2f;">내 단톡방 리스트</h3>
            {% if my_rooms %}
                {% for room in my_rooms %}
                    <div class="room-item">
                        <span>💬 {{ room[1] }}</span>
                        <a href="/group/chat/{{ room[0] }}" style="color:#adff2f; font-weight:bold;">입장</a>
                    </div>
                {% endfor %}
            {% else %}
                <p style="color:#666; font-size:0.9rem;">참여 중인 단톡방이 없습니다.</p>
            {% endif %}
            <br><a href="/logout" style="color:#ff6b6b; display:block; text-align:center; margin-top:15px;">로그아웃</a>
        {% else %}
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <a href="/login" class="btn-link" style="flex:1;">로그인</a>
                <a href="/register" class="btn-link" style="flex:1; background:#adff2f; color:#000;">회원가입</a>
            </div>
        {% endif %}
        
        <hr style="border:1px solid #2e2e3e; margin:25px 0;">
        <h3 style="color: #adff2f;">🔍 유저 검색</h3>
        <form action="/search" method="get">
            <input type="text" name="query" placeholder="아이디를 검색하세요...">
            <button type="submit">검색하기</button>
        </form>
    </div>
</body>
</html>

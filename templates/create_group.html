<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatClub - 새 단톡방 개설</title>
    <style>
        body { background-color: #121212; color: #ffffff; font-family: '-apple-system', sans-serif; padding: 20px; }
        .container { max-width: 450px; margin: 60px auto; background: #1e1e1e; padding: 30px; border-radius: 12px; border: 1px solid #363636; text-align: center; }
        h2 { font-size: 1.5rem; margin-bottom: 20px; font-weight:700; }
        input { width: 100%; padding: 14px; border: 1px solid #363636; border-radius: 8px; background: #262626; color: white; box-sizing: border-box; outline: none; margin-bottom: 15px; }
        input:focus { border-color: #0095f6; }
        button { background: #0095f6; color: white; border: none; padding: 14px; font-weight: bold; border-radius: 8px; cursor: pointer; width: 100%; }
        a { color:#a8a8a8; text-decoration:none; font-size:0.9rem; display:inline-block; margin-top:20px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>새로운 단톡방 개설</h2>
        <form method="post">
            <input type="text" name="room_name" placeholder="대화방 이름을 입력하세요" required>
            <button type="submit">채팅방 생성하고 입장하기</button>
        </form>
        <a href="/">취소하고 돌아가기</a>
    </div>
</body>
</html>

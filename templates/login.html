<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로그인 - ChatClub</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #121620;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --gradient-instagram: linear-gradient(45deg, #00c6ff, #0072ff, #00f260);
            --border-color: #1e293b;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .login-box { width: 100%; max-width: 400px; padding: 30px; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 16px; box-sizing: border-box; text-align: center; }
        h2 { margin-bottom: 25px; background: linear-gradient(45deg, #00f260, #00c6ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.8rem; }
        .input-group { margin-bottom: 16px; text-align: left; }
        .input-group label { display: block; margin-bottom: 6px; font-size: 0.9rem; color: var(--text-muted); }
        .input-group input { width: 100%; padding: 12px; background-color: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; box-sizing: border-box; outline: none; }
        .btn-submit { width: 100%; background: var(--gradient-instagram); color: #fff; border: none; padding: 12px; border-radius: 8px; font-weight: 700; font-size: 1rem; cursor: pointer; margin-top: 10px; }
        .footer-links { margin-top: 20px; font-size: 0.9rem; color: var(--text-muted); }
        .footer-links a { color: #00f260; text-decoration: none; font-weight: 600; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>ChatClub 로그인</h2>
    <form action="{{ url_for('login') }}" method="POST">
        <div class="input-group">
            <label>아이디</label>
            <input type="text" name="username" required autocomplete="off">
        </div>
        <div class="input-group">
            <label>비밀번호</label>
            <input type="password" name="password" required>
        </div>
        <button type="submit" class="btn-submit">로그인</button>
    </form>
    <div class="footer-links">
        계정이 없으신가요? <a href="{{ url_for('register') }}">회원가입</a>
    </div>
</div>
</body>
</html>

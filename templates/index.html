<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatClub</title>
    <style>
      body { background-color: #fafafa !important; color: #262626 !important; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .container { max-width: 450px; margin: 40px auto; background: #ffffff !important; padding: 30px; border: 1px solid #dbdbdb; border-radius: 12px; }
        h1 { font-size: 2.2rem; font-weight: 800; color: #262626 !important; text-align: center; margin-bottom: 20px; }
        input[type="text"], input[type="password"] { width: 100%; padding: 12px; border: 1px solid #dbdbdb !important; background-color: #fafafa !important; color: #262626 !important; border-radius: 8px; box-sizing: border-box; }
        input[type="text"]:focus, input[type="password"]:focus { border-color: #a8a8a8 !important; }
        button, .btn-link-primary { width: 100%; background: #0095f6 !important; color: #ffffff !important; border: none; padding: 12px; font-weight: 600; border-radius: 8px; cursor: pointer; display: inline-block; text-align: center; box-sizing: border-box; }
        button:hover, .btn-link-primary:hover { background: #1877f2 !important; }
        .btn-link { display: inline-block; width: 100%; background: #ffffff; color: #0095f6 !important; border: 1px solid #dbdbdb; padding: 12px; font-weight: 600; border-radius: 8px; text-align: center; box-sizing: border-box; }
        .btn-link:hover { background: #fafafa; }
        .room-item { background: #fafafa !important; border: 1px solid #dbdbdb; padding: 15px; border-radius: 8px; margin-bottom: 10px; color: #262626 !important; }
        a { color: #00376b !important; text-decoration: none; font-size: 0.9rem; font-weight: 600; }
        a:hover { color: #0095f6 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h1>ChatClub</h1>
        {% if session.get('user') %}
            <p style="color: #a8a8a8; text-align: center; font-size:0.95rem; margin-bottom: 20px;">🔥 <b style="color:#fff;">{{ session['user'] }}</b>님 대화 중</p>
            <a href="/user/{{ session['user'] }}" class="btn-link-primary">내 프로필 홈</a>
            <a href="/group/create" class="btn-link">➕ 새 단톡방 생성</a>
            
            <h3 style="margin-top:30px; color:#ffffff; font-size:1.1rem; border-bottom: 1px solid #363636; padding-bottom:8px;">내 오픈 단톡방</h3>
            {% if my_rooms %}
                {% for room in my_rooms %}
                    <div class="room-item">
                        <span>💬 {{ room.room_name }}</span>
                        <a href="/group/chat/{{ room.id }}" style="font-weight: bold;">입장</a>
                    </div>
                {% endfor %}
            {% else %}
                <p style="color:#737373; font-size:0.9rem; text-align:center; padding: 15px 0;">개설한 오픈 대화방이 없습니다.</p>
            {% endif %}
            <br><a href="/logout" style="color:#ed4956; display:block; text-align:center; margin-top:15px; font-weight:600;">로그아웃</a>
        {% else %}
            <div style="display:flex; gap:10px; margin-bottom:20px;">
                <a href="/login" class="btn-link" style="flex:1; margin:0;">로그인</a>
                <a href="/register" class="btn-link-primary" style="flex:1; margin:0;">회원가입</a>
            </div>
        {% endif %}
        
        <hr style="border:0; border-top:1px solid #363636; margin:30px 0;">
        <h3 style="color: #ffffff; font-size:1.1rem; margin-bottom: 12px;">🔍 유저 검색</h3>
        <form action="/search" method="get">
            <input type="text" name="query" placeholder="찾으려는 아이디를 입력하세요...">
            <button type="submit">검색하기</button>
        </form>
    </div>
</body>
</html>

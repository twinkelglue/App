<!DOCTYPE html>
<html>
<head>
    <title>Asked Platform</title>
</head>
<body>
    <h1>asked. 플랫폼</h1>
    {% if session.get('user') %}
        <p>{{ session['user'] }}님 환영합니다! <a href="/logout">로그아웃</a></p>
        <p><a href="/user/{{ session['user'] }}">내 프로필 홈 가기</a></p>
        <p><a href="/group-chat">🌐 전체 그룹 단톡방 입장</a></p>
    {% else %}
        <p><a href="/login">로그인</a> | <a href="/register">회원가입</a></p>
    {% endif %}
    <hr>
    <h3>친구 ID 검색</h3>
    <form action="/search" method="get">
        <input type="text" name="query" placeholder="친구 아이디 입력...">
        <button type="submit">검색</button>
    </form>
</body>
</html>

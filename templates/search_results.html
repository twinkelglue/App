<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatClub - 검색 결과</title>
    <style>
     <style>
        body { 
            background-color: #fafafa; 
            color: #262626; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 420px; 
            margin: 30px auto; 
            background: #ffffff; 
            padding: 24px; 
            border-radius: 12px; 
            border: 1px solid #dbdbdb; 
            box-sizing: border-box;
        }
        h2 { 
            font-size: 1.3rem; 
            margin-bottom: 20px; 
            font-weight: 700; 
            color: #262626;
            letter-spacing: -0.5px;
        }
        .btn-home { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: #737373; 
            font-size: 0.9rem;
            text-decoration: none; 
            font-weight: 600;
        }
        .btn-home:hover {
            color: #0095f6;
        }
        /* 유저 검색 목록 카드 */
        .user-item { 
            background: #ffffff; 
            padding: 14px 16px; 
            border-radius: 12px; 
            margin-bottom: 10px; 
            border: 1px solid #dbdbdb;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
        }
        .username { 
            font-weight: 700; 
            color: #262626; 
            font-size: 0.95rem;
        }
        .nickname { 
            color: #737373; 
            font-size: 0.85rem; 
            margin-left: 6px; 
        }
        /* 프로필 방문 버튼 */
        .btn-visit { 
            color: #ffffff; 
            background-color: #0095f6;
            font-weight: 600; 
            text-decoration: none; 
            font-size: 0.85rem; 
            padding: 6px 14px;
            border-radius: 8px;
            transition: background 0.15s ease;
        }
        .btn-visit:hover {
            background-color: #1877f2;
        }
    </style>
    </style>
</head>
<body>
    <div class="container">
        <h2>🔍 '{{ query }}' 검색결과</h2>
        <a href="/" class="btn-home">🏠 메인 홈화면으로</a>
        <hr style="border:0; border-top:1px solid #363636; margin-bottom:20px;">
        
        {% if results %}
            {% for user in results %}
                <div class="user-item">
                    <div>
                        <span class="username">@{{ user.username }}</span>
                        <span class="nickname">({{ user.nickname }})</span>
                    </div>
                    <a href="/user/{{ user.username }}" class="btn-visit">프로필 방문</a>
                </div>
            {% endfor %}
        {% else %}
            <p style="color:#737373; text-align:center; font-size:0.9rem; padding:20px 0;">검색 결과 일치하는 유저가 없습니다.</p>
        {% endif %}
    </div>
</body>
</html>

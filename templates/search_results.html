<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Results</title>
    <style>
        body { background-color: #0f0f12; color: #ffffff; font-family: 'Pretendard', sans-serif; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: #1a1a24; padding: 25px; border-radius: 20px; }
        .user-card { background: #252535; padding: 15px; border-radius: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
        a { color: #fff; text-decoration: none; font-weight: bold; }
        .btn-sm { background: #adff2f; color: #000; padding: 6px 12px; font-size: 0.85rem; border-radius: 15px; font-weight: bold; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h3 style="color:#adff2f;">'{{ query }}' 검색 결과</h3>
        <p><a href="/" style="color:#aaa;">◀ 홈으로</a></p>
        <hr style="border:1px solid #2e2e3e; margin:15px 0;">
        {% if results %}
            {% for row in results %}
                <div class="user-card">
                    <div>
                        <a href="/user/{{ row[0] }}">⚡ {{ row[0] }}</a>
                        <p style="margin:5px 0 0 0; font-size:0.85rem; color:#aaa;">{{ row[1] }}</p>
                    </div>
                    <div>
                        <a href="/user/{{ row[0] }}" class="btn-sm">구경가기</a>
                    </div>
                </div>
            {% endfor %}
        {% else %}
            <p style="color:#666;">해당 유저가 존재하지 않습니다.</p>
        {% endif %}
    </div>
</body>
</html>

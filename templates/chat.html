<!DOCTYPE html>
<html>
<head>
    <title>채팅방</title>
</head>
<body>
    <h2>상대: {{ target_user }}</h2>
    <p><a href="/">🏠 메인 홈으로</a></p>
    <hr>
    <div style="border: 1px solid #000; height: 300px; overflow-y: scroll; padding: 10px; background-color: #f9f9f9;">
        {% for chat in chat_history %}
            <p><b>{{ chat[0] }}:</b> {{ chat[1] }} <span style="font-size: 11px; color: gray;">({{ chat[2] }})</span></p>
        {% endfor %}
    </div>
    <br>
    <form method="post">
        <input type="text" name="message" style="width: 70%;" placeholder="메시지를 입력하세요..." required autofocus>
        <button type="submit">전송</button>
    </form>
    <br>
    <button onclick="location.reload();">🔄 새로고침 (새 메시지 확인)</button>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>검색 결과 - ChatClub</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #121620;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --gradient-instagram: linear-gradient(45deg, #00c6ff, #0072ff, #00f260);
            --border-color: #1e293b;
        }
        body { background-color: var(--bg-color); color: var(--text-color); font-family: -apple-system, sans-serif; margin: 0; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 500px; min-height: 100vh; background-color: var(--bg-color); border-left: 1px solid var(--border-color); border-right: 1px solid var(--border-color); box-sizing: border-box; padding: 20px; }
        .nav-header { display: flex; align-items: center; margin-bottom: 20px; }
        .nav-header .btn-back { color: var(--text-color); text-decoration: none; font-size: 1.2rem; margin-right: 15px; font-weight: bold; }
        h2 { font-size: 1.3rem; margin-bottom: 20px; color: #ffffff; }
        .search-form { display: flex; gap: 10px; margin-bottom: 25px; }
        .search-form input { flex-grow: 1; padding: 12px; background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 8px; color: #fff; outline: none; }
        .search-form button { background: var(--gradient-instagram); color: #fff; border: none; padding: 0 20px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .result-card { background-color: var(--card-bg); border: 1px solid var(--border-color); border-radius: 12px; padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
        .result-info .nickname { font-weight: 600; color: #fff; font-size: 1.05rem; }
        .result-info .username { color: var(--text-muted); font-size: 0.85rem; }
        .btn-view { background-color: #1e293b; color: #fff; text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 0.85rem; font-weight: 600; }
    </style>
</head>
<body>
<div class="container">
    <div class="nav-header">
        <a href="{{ url_for('index') }}" class="btn-back">❮ 홈으로</a>
    </div>
    <h2>유저 검색하기</h2>
    <form action="{{ url_for('search') }}" method="GET" class="search-form">
        <input type="text" name="query" value="{{ query }}" placeholder="아이디로 검색..." required autocomplete="off">
        <button type="submit">검색</button>
    </form>

    <div style="font-size: 0.9rem; color: var(--text-muted); margin-bottom: 15px;">
        '{{ query }}' 검색 결과
    </div>

    {% if results %}
        {% for r in results %}
        <div class="result-card">
            <div class="result-info">
                <div class="nickname">{{ r.nickname }}</div>
                <div class="username">@{{ r.username }}</div>
            </div>
            <a href="{{ url_for('user_profile', username=r.username) }}" class="btn-view">프로필 방문</a>
        </div>
        {% endfor %}
    {% else %}
        <div style="text-align: center; color: var(--text-muted); padding: 30px;">일치하는 유저가 없습니다.</div>
    {% endif %}
</div>
</body>
</html>

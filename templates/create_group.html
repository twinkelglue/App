<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatClub - 새 단톡방 개설</title>
    <style>
<style>
        body { 
            background-color: #fafafa; 
            color: #262626; 
            font-family: 'Pretendard', -apple-system, sans-serif; 
            padding: 20px; 
            margin: 0; 
        }
        .container { 
            max-width: 400px; 
            margin: 60px auto; 
            background: #ffffff; 
            padding: 30px; 
            border-radius: 12px; 
            border: 1px solid #dbdbdb; 
            box-sizing: border-box;
        }
        h2 { 
            font-size: 1.4rem; 
            margin-bottom: 25px; 
            font-weight: 700; 
            text-align: center;
            color: #262626;
            letter-spacing: -0.5px;
        }
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #dbdbdb; 
            border-radius: 8px; 
            background: #fafafa;
            color: #262626;
            font-size: 0.9rem;
            box-sizing: border-box;
            margin-bottom: 12px;
            outline: none;
        }
        input:focus { 
            border-color: #a8a8a8; 
            background: #ffffff;
        }
        button { 
            background: #0095f6; 
            color: white; 
            border: none; 
            padding: 14px; 
            font-weight: 600; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 0.95rem;
            width: 100%;
            margin-top: 10px;
            transition: background 0.15s ease;
        }
        button:hover { 
            background: #1877f2; 
        }
        a { 
            color: #737373; 
            text-decoration: none; 
            font-size: 0.9rem; 
            display: inline-block; 
            margin-top: 15px;
            font-weight: 600;
        }
        a:hover {
            color: #0095f6;
        }
    </style>
    </style>
</head>
<body>
    <div class="container">
        <h2>새로운 단톡방 개설</h2>
        <form method="post">
            <input type="text" name="room_name" placeholder="대화방 이름을 입력하세요" required>
            <button type="submit">채팅방 생성하고 입장하기</button>
        </form>
        <a href="/">취소하고 돌아가기</a>
    </div>
</body>
</html>

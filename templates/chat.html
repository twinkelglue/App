<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatClub - {{ room.room_name }}</title>
    <style>
      body { background-color: #fafafa !important; color: #262626 !important; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .container { max-width: 450px; margin: 20px auto; background: #ffffff !important; border: 1px solid #dbdbdb; border-radius: 12px; display: flex; flex-direction: column; height: 85vh; overflow: hidden; box-shadow: none; }
        .chat-header { padding: 15px; border-bottom: 1px solid #dbdbdb; font-weight: bold; display: flex; justify-content: space-between; align-items: center; background: #ffffff !important; color: #262626 !important; }
        .chat-messages { flex: 1; padding: 15px; overflow-y: auto; display: flex; flex-direction: column; background: #ffffff !important; }
        .msg-bubble { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 0.95rem; line-height: 1.4; margin-bottom: 8px; }
        .msg-me { background: #0095f6 !important; color: white !important; align-self: flex-end; border-bottom-right-radius: 4px; }
        .msg-other { background: #efefef !important; color: #262626 !important; align-self: flex-start; border-bottom-left-radius: 4px; }
        .sender-name { font-size: 0.75rem; color: #737373 !important; margin-bottom: 3px; display: block; }
        .chat-footer { padding: 12px; border-top: 1px solid #dbdbdb; background: #ffffff !important; }
        .input-form { display: flex; gap: 8px; }
        .input-form input { flex: 1; padding: 10px 16px; border: 1px solid #dbdbdb !important; background-color: #ffffff !important; color: #262626 !important; border-radius: 22px; font-size: 0.95rem; }
        .input-form input:focus { border-color: #a8a8a8 !important; outline: none; }
        .input-form button { background: none !important; color: #0095f6 !important; border: none; padding: 0 8px; font-weight: 600; font-size: 0.95rem; cursor: pointer; }
        .input-form button:hover { color: #1877f2 !important; }
        .read-status { font-size: 0.7rem; color: #737373 !important; margin-top: 2px; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <div class="chat-header">
            <span>💬 {{ room.room_name }}</span>
            <a href="/" style="color:#a8a8a8; text-decoration:none; font-size:0.85rem;">나가기</a>
        </div>
        
        <div class="chat-messages" id="msgArea">
            {% for msg in messages %}
                {% if msg.sender == session.get('user') %}
                    <div class="msg-bubble msg-me">
                        <span class="sender-name" style="color:#e0e0e0; text-align:right;">나</span>
                        {{ msg.message }}
                        <div class="read-status" style="color:#f0f0f0;">읽음</div>
                    </div>
                {% else %}
                    <div class="msg-bubble msg-other">
                        <span class="sender-name">@{{ msg.sender }}</span>
                        {{ msg.message }}
                        <div class="read-status">읽음</div>
                    </div>
                {% endif %}
            {% endfor %}
        </div>
        
        <div class="chat-footer">
            <form class="input-form" method="post" id="chatForm">
                <input type="text" name="message" id="msgInput" placeholder="메시지를 입력하세요..." autocomplete="off" required>
                <button type="submit">전송</button>
            </form>
        </div>
    </div>

    <script>
        // 대화창 하단 자동 스크롤 고정
        const msgArea = document.getElementById('msgArea');
        msgArea.scrollTop = msgArea.scrollHeight;

        // 6번 조건: 상대가 켜두었을 때 실시간으로 대화가 이어지도록 5초 단위 풀링 갱신 기법 적용
        setInterval(() => {
            fetch(window.location.href)
                .then(response => response.text())
                .then(html => {
                    const parser = new DOMParser();
                    const doc = parser.parseFromString(html, 'text/html');
                    const newMessages = doc.getElementById('msgArea').innerHTML;
                    
                    // 현재 스크롤이 하단에 있는지 판별
                    const isAtBottom = msgArea.scrollHeight - msgArea.clientHeight <= msgArea.scrollTop + 50;
                    
                    msgArea.innerHTML = newMessages;
                    
                    if (isAtBottom) {
                        msgArea.scrollTop = msgArea.scrollHeight;
                    }
                });
        }, 5000); // 5초 간격으로 자동 새로고침 없이 동기화
    </script>
</body>
</html>

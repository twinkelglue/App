<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatClub - 로그인</title>
    <style>
    body { background-color: #fafafa !important; color: #262626 !important; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .container { max-width: 350px; margin: 60px auto; background: #ffffff !important; padding: 40px; border: 1px solid #dbdbdb; border-radius: 4px; box-sizing: border-box; text-align: center; }
        h2 { font-size: 1.8rem; margin-bottom: 25px; font-weight: 700; color: #262626 !important; }
        input { width: 100%; padding: 12px; border: 1px solid #dbdbdb !important; border-radius: 4px; background-color: #fafafa !important; color: #262626 !important; margin-bottom: 8px; box-sizing: border-box; font-size: 0.85rem; }
        input:focus { border-color: #a8a8a8 !important; outline: none; }
        button { width: 100%; background: #0095f6 !important; color: white !important; border: none; padding: 10px; font-weight: bold; border-radius: 8px; cursor: pointer; margin-top: 8px; font-size: 0.9rem; }
        button:hover { background: #1877f2 !important; }
        a { color: #00376b !important; text-decoration: none; font-size: 0.85rem; display: inline-block; margin-top: 20px; font-weight: 600; }
        a:hover { color: #0095f6 !important; }
    </style>
</head>
<body>
    <div class="container">
        <h2>ChatClub 로그인</h2>
        <form method="post">
            <input type="text" name="username" placeholder="아이디" required>
            <input type="password" name="password" placeholder="비밀번호" required>
            <button type="submit">로그인</button>
        </form>
        <a href="/">🏠 홈으로 이동</a>
    </div>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Make Group Chat</title>
    <style>
        body { background-color: #0f0f12; color: #ffffff; font-family: 'Pretendard', sans-serif; padding: 20px; }
        .container { max-width: 450px; margin: 0 auto; background: #1a1a24; padding: 25px; border-radius: 20px; }
        input[type="text"] { width: 100%; padding: 15px; border: 2px solid #2e2e3e; border-radius: 25px; background: #252535; color: white; box-sizing: border-box; outline: none; margin-bottom: 20px; }
        button { background: #adff2f; color: #000; border: none; padding: 12px; font-weight: bold; border-radius: 25px; cursor: pointer; width: 100%; }
        .friend-item { background: #252535; padding: 12px; border-radius: 12px; margin-bottom: 8px; display: flex; align-items: center; gap: 10px; }
        a { color: #aaa; text-decoration: none; display: block; margin-top: 15px; text-align: center; }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="color:#adff2f;">👥 새 단톡방 개설</h2>
        <form method="post">
            <label style="color:#bbb; font-size:0.9rem;">단톡방 방이름</label><br><br>
            <input type="text" name="room_name" placeholder="방 이름을 적어주세요..." required>
            
            <label style="color:#bbb; font-size:0.9rem;">초대할 팔로잉 친구 선택</label><br><br>
            {% if my_friends %}
                {% for friend in my_friends %}
                    <div class="friend-item">
                        <input type="checkbox" name="members" value="{{ friend }}" id="f_{{ friend }}" style="transform: scale(1.3);">
                        <label for="f_{{ friend }}" style="cursor:pointer;">⚡ {{ friend }}</label>
                    </div>
                {% endfor %}
            {% else %}
                <p style="color:#666; font-size:0.9rem; margin-bottom:15px;">내가 팔로우한 사람이 아직 없습니다.</p>
            {% endif %}
            
            <button type="submit" style="margin-top:15px;">단톡방 개설 & 친구 초대 완료 🔥</button>
        </form>
        <a href="/">취소하고 홈으로</a>
    </div>
</body>
</html>

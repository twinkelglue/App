<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>새 단톡방 만들기 - ChatClub</title>
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: #121620;
            --text-color: #ffffff;
            --text-muted: #94a3b8;
            --gradient-instagram: linear-gradient(45deg, #00c6ff, #0072ff, #00f260);
            --border-color: #1e293b;
        }
        body { 
            background-color: var(--bg-color); color: var(--text-color); 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; margin: 0; 
            display: flex; justify-content: center; align-items: center; min-height: 100vh; 
        }
        .form-box { 
            width: 100%; max-width: 400px; padding: 30px; 
            background-color: var(--card-bg); border: 1px solid var(--border-color); 
            border-radius: 16px; box-sizing: border-box; text-align: center; 
        }
        h2 { 
            margin-bottom: 10px; background: linear-gradient(45deg, #00f260, #00c6ff); 
            -webkit-background-clip: text; -webkit-text-fill-color: transparent; font-size: 1.6rem; 
        }
        .subtitle { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 25px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-group label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: var(--text-muted); }
        .input-group input[type="text"] { 
            width: 100%; padding: 14px; background-color: var(--bg-color); 
            border: 1px solid var(--border-color); border-radius: 8px; color: #fff; 
            box-sizing: border-box; outline: none; font-size: 1rem;
        }
        
        /* 👥 팔로우 목록 창을 위해 새로 추가한 스타일 */
        .user-list { 
            max-height: 180px; overflow-y: auto; background-color: var(--bg-color);
            border: 1px solid var(--border-color); padding: 12px; border-radius: 8px; 
        }
        .user-item { 
            margin-bottom: 10px; display: flex; align-items: center; text-align: left;
        }
        .user-item:last-child { margin-bottom: 0; }
        .user-item input[type="checkbox"] { 
            margin-right: 10px; width: 16px; height: 16px; cursor: pointer;
            accent-color: #00c6ff; /* 체크박스 포인터 색상 일치 */
        }
        .user-item label { 
            display: inline; color: #fff; font-size: 0.95rem; cursor: pointer; margin: 0;
        }
        .no-users { color: var(--text-muted); font-size: 0.9rem; text-align: center; margin: 10px 0; }

        .btn-submit { 
            width: 100%; background: var(--gradient-instagram); color: #fff; 
            border: none; padding: 14px; border-radius: 8px; font-weight: 700; 
            font-size: 1rem; cursor: pointer; margin-top: 10px;
        }
        .btn-cancel {
            display: block; margin-top: 15px; color: var(--text-muted); 
            text-decoration: none; font-size: 0.9rem;
        }
        .btn-cancel:hover { color: #ffffff; }
    </style>
</head>
<body>
<div class="form-box">
    <h2>👥 새 비밀 단톡방 개설</h2>
    <div class="subtitle">내가 팔로우한 사람들을 초대해 방을 만듭니다.</div>
    <form action="{{ url_for('create_group') }}" method="POST">
        <!-- 1. 방 이름 입력 -->
        <div class="input-group">
            <label>단톡방 이름</label>
            <input type="text" name="room_name" placeholder="예: 우리만의 아지트, 단짝방" required autocomplete="off">
        </div>
        
        <!-- 2. [새로 추가] 팔로우한 사람들 멤버 선택 영역 -->
        <div class="input-group">
            <label>초대할 팔로우 선택</label>
            <div class="user-list">
                {% if user_list %}
                    {% for u in user_list %}
                        <div class="user-item">
                            <input type="checkbox" name="invited_users" value="{{ u.username }}" id="user_{{ u.username }}">
                            <label for="user_{{ u.username }}">{{ u.nickname }} (@{{ u.username }})</label>
                        </div>
                    {% endfor %}
                {% else %}
                    <div class="no-users">아직 팔로우한 유저가 없습니다.</div>
                {% endif %}
            </div>
        </div>

        <button type="submit" class="btn-submit">🚀 단톡방 만들기</button>
    </form>
    <a href="{{ url_for('index') }}" class="btn-cancel">취소하고 돌아가기</a>
</div>
</body>
</html>

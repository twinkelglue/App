<!DOCTYPE html>
<html>
<head>
    <title>검색 결과</title>
</head>
<body>
    <h2>'{{ query }}' 검색 결과</h2>
    <p><a href="/">🏠 메인 홈으로</a></p>
    <hr>
    {% if results %}
        <ul>
        {% for user in results %}
            <li>
                <a href="/user/{{ user[0] }}"><b>{{ user[0] }}</b></a> - {{ user[1] }}
            </li>
        {% endfor %}
        </ul>
    {% else %}
        <p>검색된 사용자가 없습니다.</p>
    {% endif %}
</body>
</html>
